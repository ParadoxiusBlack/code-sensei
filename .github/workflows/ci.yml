name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Format check
        run: black --check src tests

      - name: Type check
        run: mypy src

      - name: Test
        run: pytest tests -q --tb=line

  retrieval-benchmark-delta:
    runs-on: ubuntu-latest
    needs: test-and-quality
    env:
      EMBEDDING_PROVIDER: ollama
      EMBEDDING_MODEL: nomic-embed-text
      CHROMA_PERSIST_DIR: .chroma-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-${{ runner.os }}-nomic-embed-text-v1

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama and pull embeddings model
        run: |
          ollama serve > /tmp/ollama.log 2>&1 &
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:11434/api/tags > /dev/null; then
              break
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:11434/api/tags > /dev/null
          ollama pull nomic-embed-text

      - name: Index repository for retrieval benchmark
        run: code-sensei index .

      - name: Run real retrieval benchmark
        run: |
          code-sensei benchmark-retrieval \
            --project-dir . \
            --dataset benchmarks/retrieval/code_sensei_smoke.json \
            --output-json retrieval-benchmark-summary.json

      - name: Generate retrieval benchmark delta report
        run: |
          python scripts/report_retrieval_benchmark_delta.py \
            --baseline benchmarks/retrieval/ci_baseline_summary.json \
            --current-summary retrieval-benchmark-summary.json \
            --max-latency-regression-ms 250.0 \
            --max-quality-drop 0.10 \
            --output-md retrieval-benchmark-summary.md

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: retrieval-benchmark-report
          path: |
            retrieval-benchmark-summary.json
            retrieval-benchmark-summary.md
